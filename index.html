<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>🚗 1종 수동 운전 시험 — WebGL</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- 포인터 잠금 오버레이 (클릭하면 게임 시작) -->
  <div id="overlay">
    <div id="overlay-msg">
      <h2>🚗 1종 수동 운전 시험</h2>
      <p>클릭하여 시작하세요</p>
      <div class="controls-hint">
        <span>Enter</span> 시동 &nbsp;&nbsp;
        <span>W</span> 액셀 &nbsp;&nbsp;
        <span>S</span> 브레이크 &nbsp;&nbsp;
        <span>A D</span> 조향 &nbsp;&nbsp;
        <span>Shift</span> 클러치 &nbsp;&nbsp;
        <span>E / Q</span> 기어 ↑↓
      </div>
      <div class="lod-hint">
        엔진 켜고(Enter) → 클러치(Shift) 밟은 채 1단(E) → 반클러치로 출발<br>
        체크포인트를 순서대로 통과! 시동꺼짐·도로이탈·전복·시간초과는 감점
      </div>
    </div>
  </div>

  <!-- 좌상단 와이어프레임 버튼 -->
  <div id="btn-group">
    <button id="wireframe-btn">⬡ 와이어프레임 ON &nbsp;<span style="opacity:0.55;font-size:11px">[F]</span></button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
